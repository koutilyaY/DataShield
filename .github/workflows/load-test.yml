name: Weekly Performance Regression

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 02:00 UTC
  workflow_dispatch:

jobs:
  performance-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run load tests
        run: python tests/load/load_test_100k_tables.py 2>&1 | tee load_test_results.txt

      - name: Check regression thresholds
        run: |
          python - <<'EOF'
          import re, sys
          with open("load_test_results.txt") as f:
              output = f.read()
          # Fail if blast radius mean exceeds 10ms (2x our baseline of 3.41ms)
          match = re.search(r"mean.*?([\d.]+)ms", output)
          if match:
              mean_ms = float(match.group(1))
              if mean_ms > 10.0:
                  print(f"REGRESSION: Blast radius mean {mean_ms}ms > 10ms threshold")
                  sys.exit(1)
              else:
                  print(f"OK: Blast radius mean {mean_ms}ms (threshold: 10ms)")
          EOF

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results-${{ github.run_id }}
          path: load_test_results.txt
          retention-days: 90
